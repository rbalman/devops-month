site_name: DevOps Month
site_description: A hands-on 30-day DevOps course for beginners
site_author: Balman Rawat
site_url: https://rbalman.github.io/devops-month

repo_name: rbalman/devops-month
repo_url: https://github.com/rbalman/devops-month

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Schedule: schedule.md
  - Week 1 — Linux System Administration:
    - Day 01 · DevOps Intro & Setup: week-01/day-01.md
    - Day 02 · Linux History & Filesystem: week-01/day-02.md
    - Day 03 · Everything Is a File — Text Processing: week-01/day-03.md
    - Day 04 · Users, Groups & Permissions: week-01/day-04.md
    - Day 05 · The Shell — Types, Profiles & Environment: week-01/day-05.md
    - Day 06 · Shell Scripting I — Programming Basics: week-01/day-06.md
    - Day 07 · Shell Scripting II — Decisions, Loops & Functions: week-01/day-07.md
    - Beyond the Basics (Reference): week-01/beyond-the-basics.md
  - Week 2 — Networking & Containers: week-02/index.md
  - Week 3 — IaC & Cloud: week-03/index.md
  - Week 4 — CI/CD & Monitoring: week-04/index.md
  - Resources: resources.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rbalman
    - icon: fontawesome/solid/globe
      link: https://balmanrawat.com.np
