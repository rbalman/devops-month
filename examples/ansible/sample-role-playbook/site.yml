# The same web-server setup as ../sample-playbook, but packaged into a role.
# Here the variables are passed straight to the role (no group_vars/host_vars),
# so you can see in one place exactly what the role is configured with.
#
# Run with:  ansible-playbook site.yml
- name: Configure web servers
  hosts: web
  become: true
  roles:
    - role: webserver
      vars:
        site_name: "Operation Go Live"
        worker_processes: 2
        deploy_user: deploy
        base_packages:
          - htop
          - curl
          - git
          - vim
